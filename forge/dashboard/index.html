<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge — AI Agency Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #e0e0e8;
            --text-dim: #8888a0;
            --accent: #7c5cff;
            --accent-glow: rgba(124, 92, 255, 0.15);
            --green: #2dd4a0;
            --red: #ff5c5c;
            --yellow: #ffc857;
            --blue: #5cacff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent); }
        .logo span { color: var(--text-dim); font-weight: 400; }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block; margin-right: 6px;
        }
        .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.offline { background: var(--red); }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            gap: 12px;
            padding: 16px 24px;
            height: calc(100vh - 60px);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-body { flex: 1; overflow-y: auto; }
        .task-input {
            grid-column: 1 / -1;
        }
        .task-form {
            display: flex; gap: 8px;
        }
        .task-form input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        .task-form input:focus { outline: none; border-color: var(--accent); }
        .task-form button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
        }
        .task-form button:hover { opacity: 0.9; }
        .task-form button:disabled { opacity: 0.5; cursor: not-allowed; }
        .event-item {
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .event-time { color: var(--text-dim); white-space: nowrap; min-width: 65px; }
        .event-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            white-space: nowrap;
            font-weight: 600;
        }
        .event-type.llm_call { background: var(--accent-glow); color: var(--accent); }
        .event-type.llm_response { background: rgba(45, 212, 160, 0.15); color: var(--green); }
        .event-type.tool_use { background: rgba(92, 172, 255, 0.15); color: var(--blue); }
        .event-type.tool_result { background: rgba(255, 200, 87, 0.15); color: var(--yellow); }
        .event-type.agent_start { background: rgba(124, 92, 255, 0.15); color: var(--accent); }
        .event-type.agent_complete { background: rgba(45, 212, 160, 0.15); color: var(--green); }
        .event-type.agent_error { background: rgba(255, 92, 92, 0.15); color: var(--red); }
        .event-detail { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; }
        .metric-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .metric {
            background: var(--bg);
            border-radius: 6px;
            padding: 12px;
        }
        .metric-value { font-size: 24px; font-weight: 700; color: var(--accent); }
        .metric-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
        .agent-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        .agent-name { font-weight: 600; font-size: 13px; }
        .agent-role { font-size: 11px; color: var(--text-dim); }
        .agent-status {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            margin-left: auto;
        }
        .agent-status.idle { background: rgba(136,136,160,0.15); color: var(--text-dim); }
        .agent-status.working { background: rgba(45, 212, 160, 0.15); color: var(--green); }
        .agent-status.error { background: rgba(255, 92, 92, 0.15); color: var(--red); }
        .output-area {
            background: var(--bg);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-y: auto;
            flex: 1;
            min-height: 100px;
            color: var(--text-dim);
        }
        .output-area .chunk { color: var(--text); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .working { animation: pulse 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <header>
        <div class="logo">⚒ FORGE <span>AI Agency Dashboard</span></div>
        <div id="connection-status">
            <span class="status-dot offline" id="status-dot"></span>
            <span id="status-text" style="font-size: 12px; color: var(--text-dim);">Connecting...</span>
        </div>
    </header>

    <div class="grid">
        <div class="card task-input">
            <div class="card-title">📋 Task Input</div>
            <div class="task-form">
                <input type="text" id="task-input" placeholder="Describe a task for the agency..." />
                <button id="submit-btn" onclick="submitTask()">Execute</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📡 Live Events</div>
            <div class="card-body" id="events-panel"></div>
        </div>

        <div class="card">
            <div class="card-title">💰 Metrics</div>
            <div class="card-body">
                <div class="metric-grid">
                    <div class="metric">
                        <div class="metric-value" id="metric-cost">$0.00</div>
                        <div class="metric-label">Total Cost</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metric-tokens">0</div>
                        <div class="metric-label">Tokens Used</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metric-tasks">0</div>
                        <div class="metric-label">Tasks Run</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value" id="metric-agents">0</div>
                        <div class="metric-label">Active Agents</div>
                    </div>
                </div>
                <div style="margin-top: 16px;">
                    <div class="card-title">🤖 Agents</div>
                    <div id="agents-panel"></div>
                </div>
            </div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <div class="card-title">📤 Task Output <span id="output-status"></span></div>
            <div class="output-area" id="output-panel">Waiting for task...</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let taskCount = 0;
        let eventSource = null;

        // Check connection
        async function checkConnection() {
            try {
                const resp = await fetch(`${API_BASE}/api/status`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('status-dot').className = 'status-dot online';
                    document.getElementById('status-text').textContent = data.name || 'Connected';
                    updateAgents(data);
                    return true;
                }
            } catch(e) {}
            document.getElementById('status-dot').className = 'status-dot offline';
            document.getElementById('status-text').textContent = 'Disconnected';
            return false;
        }

        function updateAgents(data) {
            const panel = document.getElementById('agents-panel');
            let html = '';
            const teams = data.teams || {};
            let agentCount = 0;
            for (const [teamName, team] of Object.entries(teams)) {
                const agents = team.agents || [];
                for (const agent of agents) {
                    agentCount++;
                    const status = agent.status || 'idle';
                    html += `<div class="agent-item">
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role || teamName}</div>
                        </div>
                        <span class="agent-status ${status}">${status}</span>
                    </div>`;
                }
            }
            panel.innerHTML = html || '<div style="color: var(--text-dim); font-size: 12px; padding: 8px;">No agents loaded</div>';
            document.getElementById('metric-agents').textContent = agentCount;
        }

        async function updateCosts() {
            try {
                const resp = await fetch(`${API_BASE}/api/costs`);
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('metric-cost').textContent = `$${(data.total_cost_usd || 0).toFixed(4)}`;
                    document.getElementById('metric-tokens').textContent = (data.total_tokens || 0).toLocaleString();
                }
            } catch(e) {}
        }

        async function loadRecentEvents() {
            try {
                const resp = await fetch(`${API_BASE}/api/events?limit=50`);
                if (resp.ok) {
                    const data = await resp.json();
                    const events = data.events || data || [];
                    events.reverse().forEach(evt => addEvent(evt));
                }
            } catch(e) {}
        }

        function addEvent(evt) {
            const panel = document.getElementById('events-panel');
            const type = evt.event_type || evt.type || 'unknown';
            const typeCss = type.replace(/[^a-z_]/g, '');
            const time = evt.timestamp ? new Date(evt.timestamp * 1000).toLocaleTimeString() : '';
            const agent = evt.agent_name || '';
            const data = evt.data || {};
            let detail = '';
            if (type.includes('llm')) detail = `${agent} → ${data.model || ''} (${data.tokens || data.prompt_tokens || ''}tok)`;
            else if (type.includes('tool')) detail = `${agent} → ${data.tool || ''}: ${(data.output_preview || '').substring(0, 60)}`;
            else detail = `${agent}: ${JSON.stringify(data).substring(0, 80)}`;

            const div = document.createElement('div');
            div.className = 'event-item';
            div.innerHTML = `
                <span class="event-time">${time}</span>
                <span class="event-type ${typeCss}">${type}</span>
                <span class="event-detail">${detail}</span>
            `;
            panel.prepend(div);
            // Keep max 100 events
            while (panel.children.length > 100) panel.removeChild(panel.lastChild);
        }

        async function submitTask() {
            const input = document.getElementById('task-input');
            const btn = document.getElementById('submit-btn');
            const output = document.getElementById('output-panel');
            const task = input.value.trim();
            if (!task) return;

            btn.disabled = true;
            btn.textContent = 'Running...';
            output.innerHTML = '';
            document.getElementById('output-status').textContent = '⏳ Processing...';
            document.getElementById('output-status').className = 'working';
            taskCount++;
            document.getElementById('metric-tasks').textContent = taskCount;

            try {
                // Try SSE streaming first
                const resp = await fetch(`${API_BASE}/api/task/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task }),
                });

                if (resp.ok && resp.headers.get('content-type')?.includes('text/event-stream')) {
                    const reader = resp.body.getReader();
                    const decoder = new TextDecoder();
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const text = decoder.decode(value);
                        const lines = text.split('\n');
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    if (data.chunk) {
                                        output.innerHTML += `<span class="chunk">${data.chunk}</span>`;
                                    } else if (data.result) {
                                        output.innerHTML += `\n\n✅ ${data.result}`;
                                    }
                                } catch(e) {
                                    output.innerHTML += line.slice(6);
                                }
                            }
                        }
                        output.scrollTop = output.scrollHeight;
                    }
                } else {
                    // Fallback to regular POST
                    const data = await resp.json();
                    output.innerHTML = `<span class="chunk">${data.output || data.result || JSON.stringify(data, null, 2)}</span>`;
                }
            } catch(e) {
                output.innerHTML = `<span style="color: var(--red);">Error: ${e.message}\n\nMake sure the agency API is running.</span>`;
            }

            btn.disabled = false;
            btn.textContent = 'Execute';
            document.getElementById('output-status').textContent = '✅ Done';
            document.getElementById('output-status').className = '';
            updateCosts();
        }

        // Enter key to submit
        document.getElementById('task-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitTask();
        });

        // Init
        checkConnection();
        loadRecentEvents();
        updateCosts();
        setInterval(checkConnection, 10000);
        setInterval(updateCosts, 5000);
    </script>
</body>
</html>
